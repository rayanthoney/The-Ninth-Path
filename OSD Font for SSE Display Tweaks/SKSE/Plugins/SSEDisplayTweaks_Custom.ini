[Render]
Fullscreen = false
Borderless = true
FramerateLimit = 58


[OSD]
Enable = true
InitiallyOn = true
Show = fps,vram
Scale = 0.8
FontFile = VCR_OSD_Mono_nopre.spritefont
Color = 255 255 153 153
OutlineColor = 0 0 0 153
